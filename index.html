<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>2D Minecraft</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section id="landingPage" class="overlay-screen">
      <div class="menu-card">
        <h1 class="game-logo">MINECRAFT 2D</h1>
        <div class="tutorial-box">
          <h3>How to Play:</h3>
          <ul>
            <li><strong>Axe (🪓)</strong> removes Wood & Leaves</li>
            <li><strong>Pickaxe (⛏️)</strong> removes Stone & Ores</li>
            <li><strong>Shovel (🧹)</strong> removes Grass & Dirt</li>
            <li><strong>Sword (⚔️)</strong> fights the Zombies!</li>
            <li>
              <strong>Left Click</strong> near your player to break or place
              blocks.
            </li>
          </ul>
        </div>
        <button id="startGameBtn" class="mc-btn">Start Game</button>
      </div>
    </section>

    <section id="gameOverScreen" class="overlay-screen hidden">
      <div class="menu-card game-over-card">
        <h1 class="game-over-text">Game Over</h1>
        <p>You were defeated by a zombie!</p>
        <button id="respawnBtn" class="mc-btn">Respawn & Reset</button>
      </div>
    </section>

    <section class="game-container">
      <main id="gameWindow">
        <section id="stage">
          <section id="worldGrid"></section>
          <article id="playerSprite"></article>
          <section id="enemyContainer"></section>
        </section>

        <section id="heartUI"></section>

        <button id="resetWorldBtn" class="top-reset-btn" title="Reset World">
          🔄
        </button>
      </main>

      <footer id="toolBelt">
        <button class="tool-btn active" data-tool="sword" title="Sword">
          ⚔️
        </button>
        <button class="tool-btn" data-tool="axe" title="Axe">🪓</button>
        <button class="tool-btn" data-tool="pickaxe" title="Pickaxe">⛏️</button>
        <button class="tool-btn" data-tool="shovel" title="Shovel">🧹</button>

        <button
          class="tool-btn item-btn"
          data-tool="place-grass"
          title="Grass"
          style="display: none"
        >
          <span class="block-preview grass-preview"></span>
          <span class="item-count" id="count-grass">0</span>
        </button>
        <button
          class="tool-btn item-btn"
          data-tool="place-dirt"
          title="Dirt"
          style="display: none"
        >
          <span class="block-preview dirt-preview"></span>
          <span class="item-count" id="count-dirt">0</span>
        </button>
        <button
          class="tool-btn item-btn"
          data-tool="place-stone"
          title="Stone"
          style="display: none"
        >
          <span class="block-preview stone-preview"></span>
          <span class="item-count" id="count-stone">0</span>
        </button>
        <button
          class="tool-btn item-btn"
          data-tool="place-wood"
          title="Wood"
          style="display: none"
        >
          <span class="block-preview wood-preview"></span>
          <span class="item-count" id="count-wood">0</span>
        </button>
        <button
          class="tool-btn item-btn"
          data-tool="place-coal"
          title="Coal"
          style="display: none"
        >
          <span class="block-preview coal-preview"></span>
          <span class="item-count" id="count-coal">0</span>
        </button>
        <button
          class="tool-btn item-btn"
          data-tool="place-iron"
          title="Iron"
          style="display: none"
        >
          <span class="block-preview iron-preview"></span>
          <span class="item-count" id="count-iron">0</span>
        </button>
        <button
          class="tool-btn item-btn"
          data-tool="place-gold"
          title="Gold"
          style="display: none"
        >
          <span class="block-preview gold-preview"></span>
          <span class="item-count" id="count-gold">0</span>
        </button>
        <button
          class="tool-btn item-btn"
          data-tool="place-diamond"
          title="Diamond"
          style="display: none"
        >
          <span class="block-preview diamond-preview"></span>
          <span class="item-count" id="count-diamond">0</span>
        </button>
      </footer>
    </section>

    <script src="World.js"></script>
    <script src="Player.js"></script>
    <script src="Enemy.js"></script>
    <script src="Engine.js"></script>
  </body>
</html>
