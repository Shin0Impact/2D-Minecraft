<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>2D Minecraft</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section
      class="game-wrapper"
      style="
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: start;
        margin-top: 20px;
      "
    >
      <main
        id="gameWindow"
        style="
          position: relative;
          width: 800px;
          height: 600px;
          background-color: #74b9ff;
          overflow: hidden;
          margin: 0;
        "
      >
        <section
          id="stage"
          style="position: absolute; top: 0; left: 0; width: 100%; height: 100%"
        >
          <section id="worldGrid"></section>
          <article
            id="playerSprite"
            style="position: absolute; width: 30px; height: 45px"
          ></article>
          <section id="enemyContainer"></section>
        </section>

        <section id="heartUI"></section>
      </main>

      <aside id="toolBelt">
        <button class="tool-btn active" data-tool="sword">Sword</button>
        <button class="tool-btn" data-tool="axe">Axe</button>
        <button class="tool-btn" data-tool="pickaxe">Pickaxe</button>
        <button class="tool-btn" data-tool="shovel">Shovel</button>
      </aside>
    </section>

    <script src="World.js"></script>
    <script src="Player.js"></script>
    <script src="Enemy.js"></script>
    <script src="Engine.js"></script>
  </body>
</html>
