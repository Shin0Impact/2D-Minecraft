<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>2D Minecraft Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div
      id="gameWindow"
      style="
        position: relative;
        width: 800px;
        height: 600px;
        background-color: #74b9ff;
        overflow: hidden;
      "
    >
      <div id="worldGrid"></div>
      <div
        id="playerSprite"
        style="
          position: absolute;
          width: 30px;
          height: 45px;
          background-color: red;
        "
      ></div>
      <div id="enemyContainer"></div>
    </div>

    <script src="World.js"></script>
    <script src="Player.js"></script>
    <script src="Enemy.js"></script>
    <script src="Engine.js"></script>
  </body>
</html>
