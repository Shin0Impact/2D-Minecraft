<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>2D Minecraft</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main
      id="gameWindow"
      style="
        position: relative;
        width: 800px;
        height: 600px;
        background-color: #74b9ff;
        overflow: hidden;
      "
    >
      <section id="worldGrid"></section>

      <section id="heartUI"></section>

      <article
        id="playerSprite"
        style="position: absolute; width: 30px; height: 45px"
      ></article>

      <section id="enemyContainer"></section>
    </main>

    <script src="World.js"></script>
    <script src="Player.js"></script>
    <script src="Enemy.js"></script>
    <script src="Engine.js"></script>
  </body>
</html>
